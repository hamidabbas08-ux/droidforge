name: Flutter Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with Git LFS
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Fetch Git LFS files
        run: |
          git lfs install
          git lfs pull
          git lfs checkout
          echo "Embedded JDK modules size:"
          wc -c android/app/src/main/assets/jdk17/lib/modules
          test "$(wc -c < android/app/src/main/assets/jdk17/lib/modules)" -eq 128712865

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DroidForge-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
