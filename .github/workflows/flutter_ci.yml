name: Flutter Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with Git LFS
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verify signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.DROIDFORGE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.DROIDFORGE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.DROIDFORGE_KEY_ALIAS }}
        run: |
          set -euo pipefail

          test -n "$KEYSTORE_BASE64" || {
            echo "DROIDFORGE_KEYSTORE_BASE64 is missing"
            exit 1
          }

          test -n "$STORE_PASSWORD" || {
            echo "DROIDFORGE_STORE_PASSWORD is missing"
            exit 1
          }

          test -n "$KEY_ALIAS" || {
            echo "DROIDFORGE_KEY_ALIAS is missing"
            exit 1
          }

      - name: Restore and verify permanent DroidForge signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.DROIDFORGE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.DROIDFORGE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.DROIDFORGE_KEY_ALIAS }}
        run: |
          set -euo pipefail

          printf '%s' "$KEYSTORE_BASE64" |
            base64 --decode > android/droidforge-ci.jks

          test -s android/droidforge-ci.jks

          keytool -list \
            -keystore android/droidforge-ci.jks \
            -storepass "$STORE_PASSWORD" \
            -alias "$KEY_ALIAS"

          chmod 600 android/droidforge-ci.jks

          echo "Permanent signing key verified successfully."

      - name: Build Android ARM64 Java launcher shim
        shell: bash
        run: |
          set -euo pipefail

          NDK_HOME="${ANDROID_NDK_LATEST_HOME:-${ANDROID_NDK_HOME:-}}"

          if [ -z "$NDK_HOME" ]; then
            NDK_HOME="$(find "$ANDROID_SDK_ROOT/ndk"               -mindepth 1               -maxdepth 1               -type d               | sort -V               | tail -n 1)"
          fi

          CLANG="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"

          test -x "$CLANG"

          mkdir -p android/app/src/main/jniLibs/arm64-v8a

          "$CLANG"             -fPIE             -pie             -O2             -Wall             -Wextra             native/java_shim/droidforge_java_shim.c             -o android/app/src/main/jniLibs/arm64-v8a/libdroidforge_java_shim.so

          file android/app/src/main/jniLibs/arm64-v8a/libdroidforge_java_shim.so

          "$CLANG" \
            -fPIE \
            -pie \
            -O2 \
            -Wall \
            -Wextra \
            native/aapt2_shim/droidforge_aapt2_shim.c \
            -o android/app/src/main/jniLibs/arm64-v8a/libdroidforge_aapt2_shim.so

          test -s \
            android/app/src/main/jniLibs/arm64-v8a/libdroidforge_aapt2_shim.so

          file \
            android/app/src/main/jniLibs/arm64-v8a/libdroidforge_aapt2_shim.so

          readelf -h \
            android/app/src/main/jniLibs/arm64-v8a/libdroidforge_aapt2_shim.so

          "$CLANG" \
            -shared \
            -fPIC \
            -O2 \
            -Wall \
            -Wextra \
            native/pointer_tag/droidforge_disable_tags.c \
            -o android/app/src/main/jniLibs/arm64-v8a/libdroidforge_disable_tags.so

          test -s \
            android/app/src/main/jniLibs/arm64-v8a/libdroidforge_disable_tags.so

          file \
            android/app/src/main/jniLibs/arm64-v8a/libdroidforge_disable_tags.so

          readelf -d \
            android/app/src/main/jniLibs/arm64-v8a/libdroidforge_disable_tags.so


          readelf -h             android/app/src/main/jniLibs/arm64-v8a/libdroidforge_java_shim.so

      - name: Build DroidForge AAPT2 compatibility agent
        shell: bash
        run: |
          set -euo pipefail

          AGENT_BUILD_DIR="$RUNNER_TEMP/droidforge-aapt2-agent"
          AGENT_CLASSES="$AGENT_BUILD_DIR/classes"
          AGENT_MANIFEST="$AGENT_BUILD_DIR/MANIFEST.MF"
          AGENT_OUTPUT="android/app/src/main/assets/droidforge-aapt2-agent.jar"

          rm -rf "$AGENT_BUILD_DIR"
          mkdir -p "$AGENT_CLASSES"
          mkdir -p "$(dirname "$AGENT_OUTPUT")"

          javac \
            -source 17 \
            -target 17 \
            --add-exports \
            java.base/jdk.internal.org.objectweb.asm=ALL-UNNAMED \
            -d "$AGENT_CLASSES" \
            tools/aapt2_agent/src/com/hamid/droidforge/agent/DroidForgeAapt2Agent.java

          printf '%s\n' \
            'Manifest-Version: 1.0' \
            'Premain-Class: com.hamid.droidforge.agent.DroidForgeAapt2Agent' \
            'Can-Redefine-Classes: false' \
            'Can-Retransform-Classes: false' \
            '' > "$AGENT_MANIFEST"

          jar cfm \
            "$AGENT_OUTPUT" \
            "$AGENT_MANIFEST" \
            -C "$AGENT_CLASSES" .

          test -s "$AGENT_OUTPUT"
          jar tf "$AGENT_OUTPUT"
          unzip -p "$AGENT_OUTPUT" META-INF/MANIFEST.MF

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Build permanently signed debug APK
        env:
          DROIDFORGE_KEYSTORE_PATH: droidforge-ci.jks
          DROIDFORGE_STORE_PASSWORD: ${{ secrets.DROIDFORGE_STORE_PASSWORD }}
          DROIDFORGE_KEY_PASSWORD: ${{ secrets.DROIDFORGE_STORE_PASSWORD }}
          DROIDFORGE_KEY_ALIAS: ${{ secrets.DROIDFORGE_KEY_ALIAS }}
        run: |
          set -euo pipefail

          flutter build apk \
            --debug \
            --target-platform android-arm64

      - name: Verify APK signature
        run: |
          set -euo pipefail

          APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"

          test -s "$APK_PATH"

          APKSIGNER="$(find "$ANDROID_HOME/build-tools" \
            -type f \
            -name apksigner \
            | sort -V \
            | tail -n 1)"

          test -n "$APKSIGNER"

          "$APKSIGNER" verify \
            --verbose \
            --print-certs \
            "$APK_PATH"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DroidForge-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
