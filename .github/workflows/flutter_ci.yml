name: Flutter Android Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with Git LFS
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verify signing secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.DROIDFORGE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.DROIDFORGE_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.DROIDFORGE_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.DROIDFORGE_KEY_ALIAS }}
        run: |
          set -euo pipefail

          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "DROIDFORGE_KEYSTORE_BASE64 secret is missing"
            exit 1
          fi

          if [ -z "$STORE_PASSWORD" ]; then
            echo "DROIDFORGE_STORE_PASSWORD secret is missing"
            exit 1
          fi

          if [ -z "$KEY_PASSWORD" ]; then
            echo "DROIDFORGE_KEY_PASSWORD secret is missing"
            exit 1
          fi

          if [ -z "$KEY_ALIAS" ]; then
            echo "DROIDFORGE_KEY_ALIAS secret is missing"
            exit 1
          fi

      - name: Restore permanent DroidForge signing key
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.DROIDFORGE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.DROIDFORGE_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.DROIDFORGE_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.DROIDFORGE_KEY_ALIAS }}
        run: |
          set -euo pipefail

          printf '%s' "$KEYSTORE_BASE64" \
            | base64 --decode \
            > android/app/droidforge-ci.jks

          chmod 600 android/app/droidforge-ci.jks

          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=droidforge-ci.jks
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Build permanently signed debug APK
        run: |
          flutter build apk \
            --debug \
            --build-number="${{ github.run_number }}"

      - name: Verify APK signature
        shell: bash
        run: |
          set -euo pipefail

          APKSIGNER="$(find "$ANDROID_HOME/build-tools" \
            -type f \
            -name apksigner \
            | sort -V \
            | tail -n 1)"

          if [ -z "$APKSIGNER" ]; then
            echo "apksigner was not found"
            exit 1
          fi

          "$APKSIGNER" verify \
            --verbose \
            --print-certs \
            build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DroidForge-permanent-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
