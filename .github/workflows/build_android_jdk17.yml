name: Build Android JDK 17 Package

on:
  workflow_dispatch:

jobs:
  build-jdk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install archive tools
        run: |
          sudo apt-get update
          sudo apt-get install -y xz-utils curl

      - name: Download Termux package metadata
        run: |
          set -euo pipefail

          mkdir -p jdk-build

          curl -fL \
            "https://packages.termux.dev/apt/termux-main/dists/stable/main/binary-aarch64/Packages" \
            -o jdk-build/Packages

          test -s jdk-build/Packages

      - name: Locate OpenJDK 17 package
        run: |
          set -euo pipefail

          PACKAGE_PATH="$(
            awk '
              BEGIN {
                RS = ""
                FS = "\n"
              }

              {
                package_name = ""
                filename = ""

                for (i = 1; i <= NF; i++) {
                  if ($i ~ /^Package:[[:space:]]*/) {
                    package_name = $i
                    sub(/^Package:[[:space:]]*/, "", package_name)
                  }

                  if ($i ~ /^Filename:[[:space:]]*/) {
                    filename = $i
                    sub(/^Filename:[[:space:]]*/, "", filename)
                  }
                }

                if (package_name == "openjdk-17" && filename != "") {
                  print filename
                  exit
                }
              }
            ' jdk-build/Packages
          )"

          echo "Located package: $PACKAGE_PATH"
          test -n "$PACKAGE_PATH"

          echo "PACKAGE_PATH=$PACKAGE_PATH" >> "$GITHUB_ENV"

      - name: Download OpenJDK 17 package
        run: |
          set -euo pipefail

          curl -fL \
            "https://packages.termux.dev/apt/termux-main/$PACKAGE_PATH" \
            -o jdk-build/openjdk-17.deb

          test -s jdk-build/openjdk-17.deb

          dpkg-deb --info jdk-build/openjdk-17.deb

      - name: Extract OpenJDK 17
        run: |
          set -euo pipefail

          mkdir -p jdk-build/root

          dpkg-deb -x \
            jdk-build/openjdk-17.deb \
            jdk-build/root

          find jdk-build/root \
            -type f \
            -path '*/bin/java' \
            -print

      - name: Create DroidForge JDK archive
        run: |
          set -euo pipefail

          JAVA_FILE="$(
            find jdk-build/root \
              -type f \
              -path '*/bin/java' \
              -print \
              | head -n 1
          )"

          test -n "$JAVA_FILE"

          JDK_DIR="$(dirname "$(dirname "$JAVA_FILE")")"

          echo "JDK directory: $JDK_DIR"

          test -f "$JDK_DIR/bin/java"
          test -f "$JDK_DIR/bin/javac"

          mkdir -p jdk-build/archive/jdk-17

          cp -a \
            "$JDK_DIR"/. \
            jdk-build/archive/jdk-17/

          tar \
            -C jdk-build/archive \
            -cJf jdk17-android-arm64.tar.xz \
            jdk-17

          test -s jdk17-android-arm64.tar.xz

          sha256sum \
            jdk17-android-arm64.tar.xz \
            | tee jdk17-android-arm64.tar.xz.sha256

          stat -c '%n | %s bytes' \
            jdk17-android-arm64.tar.xz

      - name: Upload JDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DroidForge-Android-JDK17
          path: |
            jdk17-android-arm64.tar.xz
            jdk17-android-arm64.tar.xz.sha256
          if-no-files-found: error
