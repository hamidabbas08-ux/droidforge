name: Build Android JDK 17 Package

on:
  workflow_dispatch:

jobs:
  build-jdk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install archive tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y xz-utils curl

      - name: Download Termux package metadata
        run: |
          set -euo pipefail

          mkdir -p jdk-build/debs jdk-build/root

          curl -fL \
            "https://packages.termux.dev/apt/termux-main/dists/stable/main/binary-aarch64/Packages" \
            -o jdk-build/Packages

          test -s jdk-build/Packages

      - name: Download JDK and runtime dependencies
        run: |
          set -euo pipefail

          PACKAGES="
          openjdk-17
          libandroid-shmem
          libandroid-spawn
          libiconv
          libjpeg-turbo
          zlib
          littlecms
          alsa-plugins
          libc++
          alsa-lib
          "

          for PACKAGE_NAME in $PACKAGES; do
            PACKAGE_PATH="$(
              awk -v wanted="$PACKAGE_NAME" '
                BEGIN {
                  RS = ""
                  FS = "\n"
                }

                {
                  package_name = ""
                  filename = ""

                  for (i = 1; i <= NF; i++) {
                    if ($i ~ /^Package:[[:space:]]*/) {
                      package_name = $i
                      sub(/^Package:[[:space:]]*/, "", package_name)
                    }

                    if ($i ~ /^Filename:[[:space:]]*/) {
                      filename = $i
                      sub(/^Filename:[[:space:]]*/, "", filename)
                    }
                  }

                  if (package_name == wanted && filename != "") {
                    print filename
                    exit
                  }
                }
              ' jdk-build/Packages
            )"

            echo "$PACKAGE_NAME -> $PACKAGE_PATH"
            test -n "$PACKAGE_PATH"

            curl -fL \
              "https://packages.termux.dev/apt/termux-main/$PACKAGE_PATH" \
              -o "jdk-build/debs/${PACKAGE_NAME}.deb"

            test -s "jdk-build/debs/${PACKAGE_NAME}.deb"

            dpkg-deb -x \
              "jdk-build/debs/${PACKAGE_NAME}.deb" \
              jdk-build/root
          done

      - name: Create portable DroidForge JDK archive
        run: |
          set -euo pipefail

          TERMUX_USR="jdk-build/root/data/data/com.termux/files/usr"
          JDK_DIR="$TERMUX_USR/lib/jvm/java-17-openjdk"

          test -f "$JDK_DIR/bin/java"
          test -f "$JDK_DIR/bin/javac"
          test -f "$TERMUX_USR/lib/libandroid-spawn.so"

          mkdir -p jdk-build/archive/jdk-17/lib/droidforge-deps

          cp -a \
            "$JDK_DIR"/. \
            jdk-build/archive/jdk-17/

          find "$TERMUX_USR/lib" \
            -maxdepth 1 \
            -type f \
            \( -name '*.so' -o -name '*.so.*' \) \
            -exec cp -a {} jdk-build/archive/jdk-17/lib/droidforge-deps/ \;

          test -f \
            jdk-build/archive/jdk-17/lib/droidforge-deps/libandroid-spawn.so

          tar \
            -C jdk-build/archive \
            -cJf jdk17-android-arm64.tar.xz \
            jdk-17

          sha256sum \
            jdk17-android-arm64.tar.xz \
            | tee jdk17-android-arm64.tar.xz.sha256

          stat -c '%n | %s bytes' \
            jdk17-android-arm64.tar.xz

      - name: Upload JDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DroidForge-Android-JDK17
          path: |
            jdk17-android-arm64.tar.xz
            jdk17-android-arm64.tar.xz.sha256
          if-no-files-found: error
